name: 🪙 Build and Deploy Golden Coin AR

on:
  push:
    branches: [ master, main, claude/* ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  GODOT_VERSION: 4.5
  EXPORT_NAME: golden-coin-ar

jobs:
  build:
    name: 🔨 Build Web Export
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.5
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: 📦 Cache Godot imports
        uses: actions/cache@v3
        with:
          path: |
            .godot/imported
            .godot/shader_cache
          key: godot-imports-${{ hashFiles('**/*.tscn', '**/*.tres', '**/*.gd', 'project.godot') }}
          restore-keys: |
            godot-imports-

      - name: 🔧 Setup export templates
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates
          mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable

      - name: 🏗️ Import assets (headless)
        # A first headless open imports resources so the export has everything it
        # needs (generates .godot/imported). `|| true` because Godot may exit
        # non-zero after a one-shot import even when it succeeded.
        run: godot --headless --import || true

      - name: 🔨 Build for Web
        run: |
          mkdir -v -p build/web
          godot --headless --verbose --export-release "Web" build/web/index.html

      - name: 📤 Upload artifact for GitHub Pages
        uses: actions/upload-pages-artifact@v3
        if: (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main') && github.event_name == 'push'
        with:
          path: build/web

      - name: 📦 Upload web build as artifact (for download)
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web
          retention-days: 7

  deploy:
    name: 🚀 Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    if: (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main') && github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 🌐 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
