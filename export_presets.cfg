[preset.0]

name="Web"
platform="Web"
runnable=true
dedicated_server=false
custom_features=""
export_filter="all_resources"
include_filter=""
exclude_filter=""
export_path="build/web/index.html"
encryption_include_filters=""
encryption_exclude_filters=""
encrypt_pck=false
encrypt_directory=false

[preset.0.options]

custom_template/debug=""
custom_template/release=""
variant/extensions_support=false
; Single-threaded web export — no SharedArrayBuffer, so GitHub Pages needs no
; COOP/COEP headers (matches godot-test1, which deploys to Pages fine).
variant/thread_support=false
vram_texture_compression/for_desktop=true
vram_texture_compression/for_mobile=true
html/export_icon=true
html/custom_html_shell=""
; head_include: (1) a mobile viewport meta with viewport-fit=cover so the page
; fills the notch area, (2) CSS that makes the Godot canvas TRANSPARENT and
; styles the rear-camera <video> (#ar-video) to cover the screen BEHIND the
; canvas (z-index:-1). camera_feed.gd creates that <video> at runtime.
html/head_include="<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover\"><meta name=\"mobile-web-app-capable\" content=\"yes\"><style>html,body{margin:0;padding:0;background:#000;overflow:hidden;}#canvas,canvas{background:transparent !important;background-color:transparent !important;position:relative;z-index:0;}#ar-video{position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:-1;background:#000;}</style>"
html/canvas_resize_policy=2
html/focus_canvas_on_start=true
html/experimental_virtual_keyboard=false
progressive_web_app/enabled=false
progressive_web_app/offline_page=""
progressive_web_app/display=1
progressive_web_app/orientation=1
progressive_web_app/icon_144x144=""
progressive_web_app/icon_180x180=""
progressive_web_app/icon_512x512=""
progressive_web_app/background_color=Color(0, 0, 0, 1)
